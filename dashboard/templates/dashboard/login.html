<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kasa — Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #111111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }
    .login-card {
      background: #F8F8F8;
      border-radius: 20px;
      padding: 48px 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .login-logo h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: #111111;
    }
    .login-logo h1 span { color: #C46A4A; }
    .login-logo p { font-size: 0.8rem; color: rgba(0,0,0,0.4); text-transform: uppercase; letter-spacing: 2px; margin-top: 4px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.8rem; font-weight: 600; color: rgba(0,0,0,0.5); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .input-wrap { position: relative; }
    .input-wrap i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: rgba(0,0,0,0.3); font-size: 0.9rem; }
    input {
      width: 100%;
      padding: 13px 16px 13px 40px;
      border: 1.5px solid rgba(0,0,0,0.1);
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 0.92rem;
      background: white;
      outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: #C46A4A; }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: #C46A4A;
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background .2s;
    }
    .btn-login:hover { background: #a85538; }
    .error-msg {
      background: #fee2e2;
      color: #991b1b;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <h1>Ka<span>sa</span></h1>
        <p>Espace Administration</p>
      </div>

      {% if messages %}
        {% for message in messages %}
        <div class="error-msg"><i class="fa-solid fa-circle-exclamation"></i> {{ message }}</div>
        {% endfor %}
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label>Nom d'utilisateur</label>
          <div class="input-wrap">
            <i class="fa-solid fa-user"></i>
            <input type="text" name="username" placeholder="admin" required/>
          </div>
        </div>
        <div class="form-group">
          <label>Mot de passe</label>
          <div class="input-wrap">
            <i class="fa-solid fa-lock"></i>
            <input type="password" name="password" placeholder="••••••••" required/>
          </div>
        </div>
        <button type="submit" class="btn-login">Se connecter</button>
      </form>
    </div>
  </div>
</body>
</html>
