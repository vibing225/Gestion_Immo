{% extends 'dashboard/base.html' %}
{% block title %}Paramètres{% endblock %}
{% block page_title %}Paramètres{% endblock %}

{% block content %}
<div class="card" style="max-width:700px;">
  <div class="card-header">
    <h2><i class="fa-solid fa-gear" style="color:#C46A4A;margin-right:8px;"></i>Paramètres de l'entreprise</h2>
  </div>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="form-grid">
      <div class="form-group">
        <label>Nom de l'entreprise</label>
        <input type="text" name="nom_entreprise" placeholder="Kasa"/>
      </div>
      <div class="form-group">
        <label>Email de contact</label>
        <input type="email" name="email" placeholder="contact@kasa.fr"/>
      </div>
      <div class="form-group">
        <label>Téléphone</label>
        <input type="tel" name="telephone" placeholder="+33 1 23 45 67 89"/>
      </div>
      <div class="form-group">
        <label>Logo</label>
        <input type="file" name="logo" accept="image/*" style="padding:10px;"/>
      </div>
      <div class="form-group full">
        <label>Adresse</label>
        <input type="text" name="adresse" placeholder="12 rue de Paris, 75001 Paris"/>
      </div>

      <div class="form-group full">
        <label style="margin-bottom:12px;">Réseaux sociaux</label>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <div style="display:flex;align-items:center;gap:10px;">
            <i class="fa-brands fa-instagram" style="width:20px;color:#C46A4A;"></i>
            <input type="text" name="instagram" placeholder="https://instagram.com/kasa" style="flex:1;"/>
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            <i class="fa-brands fa-facebook" style="width:20px;color:#C46A4A;"></i>
            <input type="text" name="facebook" placeholder="https://facebook.com/kasa" style="flex:1;"/>
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            <i class="fa-brands fa-x-twitter" style="width:20px;color:#C46A4A;"></i>
            <input type="text" name="twitter" placeholder="https://twitter.com/kasa" style="flex:1;"/>
          </div>
        </div>
      </div>
    </div>

    <div style="margin-top:28px;">
      <button type="submit" class="btn btn-primary">
        <i class="fa-solid fa-floppy-disk"></i> Enregistrer
      </button>
    </div>
  </form>
</div>
{% endblock %}
